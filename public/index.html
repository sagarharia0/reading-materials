<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reading-materials</title>
  <link rel="stylesheet" href="css/terminal.css">

  <!-- Firebase SDK (only what we need) -->
  <script defer src="/__/firebase/12.11.0/firebase-app-compat.js"></script>
  <script defer src="/__/firebase/12.11.0/firebase-firestore-compat.js"></script>
  <script defer src="/__/firebase/12.11.0/firebase-functions-compat.js"></script>
  <script defer src="/__/firebase/init.js?useEmulator=true"></script>
</head>
<body>

  <div class="container">

    <!-- Shell Header -->
    <header class="shell-header">
      <div class="shell-title">reading-materials</div>
      <nav class="shell-nav">
        <a href="#digest" class="active" data-view="digest">digest</a>
        <a href="#library" data-view="library">library</a>
        <a href="#add" data-view="add">add</a>
      </nav>
    </header>

    <!-- ============================================
         VIEW: Add Content
         ============================================ -->
    <section id="view-add" class="view" hidden>
      <div class="section-header">submit url</div>
      <form id="url-form">
        <div class="url-input-wrapper">
          <span class="url-input-prompt">&gt;</span>
          <input
            type="url"
            class="url-input"
            id="url-input"
            placeholder="paste a url..."
            autocomplete="off"
            required
          >
          <span class="url-cursor"></span>
          <button type="submit" class="url-submit">process</button>
        </div>
      </form>
      <div id="submit-status"></div>
    </section>

    <!-- ============================================
         VIEW: Daily Digest
         ============================================ -->
    <section id="view-digest" class="view">
      <div class="section-header">digest --date <span id="digest-date"></span></div>
      <div id="digest-content">
        <div class="empty-state">
          <p>no items yet.</p>
          <p style="color: var(--text-dim);">add a url to get started</p>
        </div>
      </div>
    </section>

    <!-- ============================================
         VIEW: Content Library
         ============================================ -->
    <section id="view-library" class="view" hidden>
      <div class="section-header">library --list</div>

      <div class="filter-bar">
        <input
          type="text"
          class="filter-input"
          id="search-input"
          placeholder="grep ..."
          autocomplete="off"
        >
        <select class="filter-select" id="filter-source">
          <option value="">--source=*</option>
          <option value="youtube">youtube</option>
          <option value="substack">substack</option>
          <option value="podcast">podcast</option>
          <option value="article">article</option>
          <option value="twitter">twitter</option>
          <option value="github">github</option>
          <option value="pdf">pdf</option>
        </select>
        <select class="filter-select" id="filter-status">
          <option value="">--status=*</option>
          <option value="queued">queued</option>
          <option value="processed">processed</option>
          <option value="failed">failed</option>
        </select>
      </div>

      <div id="library-content">
        <div class="empty-state">
          <p>library is empty.</p>
        </div>
      </div>
    </section>

    <!-- ============================================
         VIEW: Deep Dive (single item)
         ============================================ -->
    <section id="view-item" class="view" hidden>
      <div class="deep-dive-header">
        <a href="#library" class="deep-dive-back" data-view="library">back to library</a>
        <h1 class="deep-dive-title" id="item-title"></h1>
        <div class="card-meta" id="item-meta"></div>
        <div id="item-tags" style="margin-top: var(--space-sm);"></div>
      </div>

      <hr class="divider-heavy">

      <div id="item-summary" style="margin-bottom: var(--space-lg);"></div>

      <div id="item-deep-dive"></div>

      <div id="item-actions" style="margin-top: var(--space-lg); display: flex; gap: var(--space-sm);">
        <button class="btn btn--primary" id="btn-go-deeper">go-deeper</button>
        <button class="btn" id="btn-open-source">open source</button>
      </div>

      <hr class="divider" style="margin-top: var(--space-xl);">

      <div style="margin-top: var(--space-md);">
        <div class="section-header">notes</div>
        <textarea
          id="item-notes"
          class="filter-input"
          style="width: 100%; min-height: 80px; resize: vertical;"
          placeholder="your notes..."
        ></textarea>
        <button class="btn" id="btn-save-notes" style="margin-top: var(--space-sm);">save</button>
      </div>
    </section>

  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
